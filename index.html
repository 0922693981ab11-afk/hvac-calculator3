<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerbalPurify-Sim | 草本科技與環境淨化模擬平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f4f0; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1rem; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center bg-green-700 text-white p-6 rounded-2xl shadow-lg">
            <div>
                <h1 class="text-2xl font-bold">HerbalPurify-Sim v1.0</h1>
                <p class="text-green-100 opacity-80">草本科技與環境淨化：CO2源頭淨化創新系統</p>
            </div>
            <div class="mt-4 md:mt-0 text-right">
                <span class="bg-green-600 px-4 py-2 rounded-full text-sm border border-green-500">專利人：黃建欣，設計人:吳啓仲</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Input Control -->
            <div class="lg:col-span-1 space-y-6">
                <section class="glass-card p-6 border-t-4 border-green-500">
                    <h2 class="text-xl font-bold mb-4 flex items-center">
                        <svg class="w-6 h-6 mr-2 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                        反應參數模擬 (RSM)
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">草本藥劑濃度 (A): <span id="valA" class="text-green-600 font-bold">3.0</span> %</label>
                            <input type="range" id="inputA" min="1" max="5" step="0.1" value="3" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-600">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">液氣比 L/G (B): <span id="valB" class="text-green-600 font-bold">10</span> L/m³</label>
                            <input type="range" id="inputB" min="5" max="15" step="1" value="10" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-600">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">進氣溫度 (C): <span id="valC" class="text-green-600 font-bold">115</span> °C</label>
                            <input type="range" id="inputC" min="80" max="150" step="5" value="115" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-600">
                        </div>
                        <div class="pt-4 border-t border-gray-100">
                            <label class="block text-sm font-medium text-gray-700 mb-2">產業情境設定</label>
                            <select id="industryType" class="w-full p-2 border border-gray-300 rounded-md focus:ring-green-500 focus:border-green-500">
                                <option value="sme">中小型製造業 (成本優先)</option>
                                <option value="large">大型上市櫃 (ESG優先)</option>
                                <option value="heavy">國營/重工業 (穩定優先)</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="glass-card p-6 border-t-4 border-blue-500">
                    <h2 class="text-xl font-bold mb-4 flex items-center">
                        <svg class="w-6 h-6 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        碳定價與經濟參數
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">碳費預期金額 (NT$/噸)</label>
                            <input type="number" id="carbonPrice" value="300" class="w-full p-2 border border-gray-300 rounded-md shadow-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">年處理量目標 (噸 CO2/年)</label>
                            <input type="number" id="targetVolume" value="1000" class="w-full p-2 border border-gray-300 rounded-md shadow-sm">
                        </div>
                    </div>
                </section>
            </div>

            <!-- Middle Column: Visualizations -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Result Cards -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                        <p class="text-gray-500 text-sm">預測 CO2 去除率</p>
                        <h3 class="text-3xl font-bold text-green-600" id="resEfficiency">--%</h3>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                        <p class="text-gray-500 text-sm">預估年碳費節省</p>
                        <h3 class="text-3xl font-bold text-blue-600" id="resSavings">NT$ 0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-orange-500">
                        <p class="text-gray-500 text-sm">預估回收年限</p>
                        <h3 class="text-3xl font-bold text-orange-600" id="resROI">-- 年</h3>
                    </div>
                </div>

                <!-- Main Chart -->
                <div class="glass-card p-6">
                    <h2 class="text-lg font-bold mb-4 text-gray-800">系統效能監測模擬 (即時)</h2>
                    <div class="h-64">
                        <canvas id="performanceChart"></canvas>
                    </div>
                </div>

                <!-- Multi-Criteria Radar -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-card p-6">
                        <h2 class="text-lg font-bold mb-4 text-gray-800">導入可行性雷達圖 (AHP)</h2>
                        <div class="h-64">
                            <canvas id="radarChart"></canvas>
                        </div>
                    </div>
                    <div class="glass-card p-6">
                        <h2 class="text-lg font-bold mb-4 text-gray-800">副產物資源化價值</h2>
                        <div class="space-y-4">
                            <div class="flex justify-between items-center bg-green-50 p-3 rounded-lg">
                                <span class="text-green-800">液態肥產出量</span>
                                <span class="font-bold" id="resFertilizer">0 L/yr</span>
                            </div>
                            <div class="flex justify-between items-center bg-green-50 p-3 rounded-lg">
                                <span class="text-green-800">肥料市場收益估值</span>
                                <span class="font-bold text-green-700" id="resFertProfit">NT$ 0</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-2">註：基於論文 2.2.3 節，副產物含 NPK 營養源。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ESG Report Section -->
        <footer class="mt-8 glass-card p-8 border border-green-200">
            <h2 class="text-2xl font-bold text-green-800 mb-4">ESG 淨零影響力摘要</h2>
            <div id="esgReport" class="text-gray-700 leading-relaxed italic">
                正在計算模擬結果以產出 ESG 建議報告...
            </div>
            <button onclick="downloadReport()" class="mt-6 bg-green-700 text-white px-6 py-2 rounded-lg hover:bg-green-800 transition shadow-md">
                下載決策分析報告 (PDF 模擬)
            </button>
        </footer>
    </div>

    <script>
        // 核心數學模型 (基於論文 3.4.2 RSM 二次多項式模擬)
        function calculateEfficiency(A, B, C) {
            // A: 藥劑濃度(1-5), B: 液氣比(5-15), C: 溫度(80-150)
            // 標準化參數 (按中心點)
            let x1 = (A - 3) / 2;
            let x2 = (B - 10) / 5;
            let x3 = (C - 115) / 35;
            
            // 模擬迴歸方程 (假設係數)
            let eff = 88.5 + 4.2*x1 + 3.5*x2 - 1.8*x3 - 2.1*x1*x1 - 1.5*x2*x2 - 3.2*x3*x3 + 0.8*x1*x2;
            return Math.min(Math.max(eff, 0), 98.5).toFixed(2);
        }

        // 初始化圖表
        const ctxPerf = document.getElementById('performanceChart').getContext('2d');
        const perfChart = new Chart(ctxPerf, {
            type: 'line',
            data: {
                labels: Array.from({length: 10}, (_, i) => `T-${10-i} min`),
                datasets: [{
                    label: 'CO2 去除率 (%)',
                    data: [82, 85, 84, 86, 88, 87, 89, 90, 88, 89],
                    borderColor: '#059669',
                    backgroundColor: 'rgba(5, 150, 105, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 60, max: 100 } } }
        });

        const ctxRadar = document.getElementById('radarChart').getContext('2d');
        const radarChart = new Chart(ctxRadar, {
            type: 'radar',
            data: {
                labels: ['技術成熟度', '經濟可行性', '環境永續性', '政策適配性', 'ESG貢獻'],
                datasets: [{
                    label: '系統評分',
                    data: [85, 70, 95, 80, 90],
                    backgroundColor: 'rgba(59, 130, 246, 0.2)',
                    borderColor: '#3b82f6',
                    pointBackgroundColor: '#3b82f6'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // 即時更新邏輯
        function updateUI() {
            const A = parseFloat(document.getElementById('inputA').value);
            const B = parseFloat(document.getElementById('inputB').value);
            const C = parseFloat(document.getElementById('inputC').value);
            const carbonPrice = parseFloat(document.getElementById('carbonPrice').value);
            const targetVolume = parseFloat(document.getElementById('targetVolume').value);
            const industry = document.getElementById('industryType').value;

            document.getElementById('valA').innerText = A;
            document.getElementById('valB').innerText = B;
            document.getElementById('valC').innerText = C;

            const eff = calculateEfficiency(A, B, C);
            document.getElementById('resEfficiency').innerText = eff + '%';

            const yearlySavings = (targetVolume * (eff/100) * carbonPrice).toLocaleString();
            document.getElementById('resSavings').innerText = 'NT$ ' + yearlySavings;

            // 簡易 ROI 試算 (假設 CAPEX 300萬)
            const capex = 3000000;
            const savingsNum = targetVolume * (eff/100) * carbonPrice;
            const roi = (capex / (savingsNum + 50000)).toFixed(1); // 加上肥料收益模擬
            document.getElementById('resROI').innerText = roi + ' 年';

            // 副產物模擬
            const fertilizerLitre = (targetVolume * 1.5).toLocaleString(); // 假設係數
            document.getElementById('resFertilizer').innerText = fertilizerLitre + ' L/yr';
            document.getElementById('resFertProfit').innerText = 'NT$ ' + (targetVolume * 50).toLocaleString();

            // 更新 ESG 報告
            let report = `根據模擬，本系統在藥劑濃度 ${A}% 及液氣比 ${B} 的操作下，可實現高達 ${eff}% 的二氧化碳捕捉率。對於${industry === 'sme' ? '中小型企業' : '大型企業'}而言，這不僅能每年節省 NT$ ${yearlySavings} 的碳費支出，更因採用天然草本製劑，能顯著提升供應鏈範疇三（Scope 3）之綠色評價。反應後的副產物可作為肥料回饋土地，達成「搖籃到大門」的生態循環。`;
            document.getElementById('esgReport').innerText = report;

            // 更新圖表數據
            perfChart.data.datasets[0].data.push(eff);
            perfChart.data.datasets[0].data.shift();
            perfChart.update();

            // 更新雷達圖權重 (基於論文表13)
            let radarData = [80, 75, 95, 80, 90];
            if (industry === 'sme') radarData = [70, 90, 80, 70, 75];
            if (industry === 'large') radarData = [85, 70, 98, 90, 95];
            radarChart.data.datasets[0].data = radarData;
            radarChart.update();
        }

        // 事件監聽
        ['inputA', 'inputB', 'inputC', 'carbonPrice', 'targetVolume', 'industryType'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateUI);
        });

        function downloadReport() {
            const reportText = document.getElementById('esgReport').innerText;
            const blob = new Blob([`黃建欣碩士論文 - 技術應用分析報告\n\n${reportText}\n\n系統預測去除率: ${document.getElementById('resEfficiency').innerText}`], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Herbal_Purify_Decision_Report.txt';
            a.click();
        }

        // 初始化
        window.onload = updateUI;
    </script>
</body>
</html>
